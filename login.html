<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log In — NotifyPro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/signup.css" />
    <style>
      .divider {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 1.4rem 0;
        color: var(--muted);
        font-size: 12px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--card-border);
      }
      .social-btn {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        background: var(--bg3);
        border: 1px solid var(--card-border);
        border-radius: var(--radius-sm);
        padding: 12px;
        color: var(--text);
        font-family: var(--font-body);
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition:
          border-color 0.2s,
          background 0.2s;
        margin-bottom: 10px;
      }
      .social-btn:hover {
        border-color: rgba(255, 255, 255, 0.2);
        background: rgba(255, 255, 255, 0.04);
      }
      .social-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .forgot-link {
        font-size: 12px;
        color: var(--muted);
        text-decoration: none;
        transition: color 0.2s;
      }
      .forgot-link:hover {
        color: var(--accent);
      }
      .label-row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 8px;
      }
      .label-row label {
        font-size: 12px;
        font-weight: 500;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .alert {
        border-radius: var(--radius-sm);
        padding: 12px 16px;
        font-size: 13px;
        margin-bottom: 1.2rem;
        display: none;
        line-height: 1.5;
      }
      .alert.show {
        display: block;
      }
      .alert-error {
        background: rgba(255, 77, 109, 0.07);
        border: 1px solid rgba(255, 77, 109, 0.2);
        color: var(--error);
      }
      .alert-success {
        background: rgba(0, 232, 122, 0.07);
        border: 1px solid rgba(0, 232, 122, 0.2);
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <!-- NAV -->
    <nav>
      <a href="index.html" class="logo">Notify<span>Pro</span></a>
      <a href="index.html" class="nav-back">← Back to home</a>
    </nav>

    <!-- PAGE -->
    <div class="page-wrap">
      <div class="signup-container">
        <div class="card">
          <h2 class="step-heading">Welcome back</h2>
          <p class="step-sub">Log in to your NotifyPro account.</p>

          <div class="alert alert-error" id="alertError"></div>
          <div class="alert alert-success" id="alertSuccess"></div>

          <!-- Google OAuth -->
          <button class="social-btn" id="googleBtn" onclick="loginWithGoogle()">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
              <path
                d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615Z"
                fill="#4285F4"
              />
              <path
                d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18Z"
                fill="#34A853"
              />
              <path
                d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332Z"
                fill="#FBBC05"
              />
              <path
                d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58Z"
                fill="#EA4335"
              />
            </svg>
            Continue with Google
          </button>

          <div class="divider">or sign in with email</div>

          <!-- Email -->
          <div class="form-group">
            <label for="email">Email Address</label>
            <input
              type="email"
              id="email"
              placeholder="hello@yourbusiness.ng"
              oninput="clearAlerts()"
            />
            <div class="error-msg" id="err-email">
              Enter a valid email address
            </div>
          </div>

          <!-- Password -->
          <div class="form-group">
            <div class="label-row">
              <label for="password">Password</label>
              <a
                href="#"
                class="forgot-link"
                id="forgotLink"
                onclick="forgotPassword(event)"
                >Forgot password?</a
              >
            </div>
            <div class="pw-wrap">
              <input
                type="password"
                id="password"
                placeholder="Your password"
                oninput="clearAlerts()"
                onkeydown="if (event.key === 'Enter') loginWithEmail();"
              />
              <button class="pw-toggle" type="button" onclick="togglePw()">
                👁
              </button>
            </div>
            <div class="error-msg" id="err-password">Password is required</div>
          </div>

          <div style="margin-top: 1.5rem">
            <button
              class="btn-primary"
              id="loginBtn"
              onclick="loginWithEmail()"
            >
              Log In →
            </button>
          </div>

          <div class="login-link" style="margin-top: 1.2rem">
            Don't have an account? <a href="signup.html">Create one free →</a>
          </div>
        </div>
      </div>
    </div>

    <script type="module">
      import { supabase } from "./assets/js/supabase-config.js";

      // ── If already logged in, skip to dashboard ───────────────────────────
      const {
        data: { session },
      } = await supabase.auth.getSession();
      if (session) window.location.href = "pages/dashboard.html";

      // Also listen for auth changes (e.g. after OAuth redirect comes back)
      supabase.auth.onAuthStateChange((event, session) => {
        if (session) window.location.href = "pages/dashboard.html";
      });

      // ── Friendly error messages ───────────────────────────────────────────
      function friendlyError(msg = "") {
        if (msg.includes("Invalid login credentials"))
          return "Incorrect email or password.";
        if (msg.includes("Email not confirmed"))
          return "Please verify your email first. Check your inbox.";
        if (msg.includes("Too many requests"))
          return "Too many attempts. Wait a moment and try again.";
        if (msg.includes("User not found"))
          return "No account found with this email.";
        if (msg.includes("Network"))
          return "Network error. Check your connection and try again.";
        return "Something went wrong. Please try again.";
      }

      // ── Email / Password login ────────────────────────────────────────────
      window.loginWithEmail = async function () {
        const btn = document.getElementById("loginBtn");
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;

        if (!email || !password) {
          showError("Please enter your email and password.");
          return;
        }

        btn.textContent = "Logging in…";
        btn.disabled = true;

        const { error } = await supabase.auth.signInWithPassword({
          email,
          password,
        });

        if (error) {
          showError(friendlyError(error.message));
          btn.textContent = "Log In →";
          btn.disabled = false;
        }
        // success → onAuthStateChange handles redirect
      };

      // ── Google OAuth ──────────────────────────────────────────────────────
      // Supabase redirects to Google, then back to your site
      window.loginWithGoogle = async function () {
        const btn = document.getElementById("googleBtn");
        btn.disabled = true;
        btn.textContent = "Redirecting to Google…";

        const { error } = await supabase.auth.signInWithOAuth({
          provider: "google",
          options: {
            redirectTo: window.location.origin + "/pages/dashboard.html",
          },
        });

        if (error) {
          showError(friendlyError(error.message));
          btn.disabled = false;
          btn.textContent = "Continue with Google";
        }
        // success → browser is redirected automatically by Supabase
      };

      // ── Forgot Password ───────────────────────────────────────────────────
      window.forgotPassword = async function (e) {
        e.preventDefault();
        const email = document.getElementById("email").value.trim();

        if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          document.getElementById("email").focus();
          showError(
            "Enter your email address above, then click Forgot password.",
          );
          return;
        }

        const link = document.getElementById("forgotLink");
        link.textContent = "Sending…";

        const { error } = await supabase.auth.resetPasswordForEmail(email, {
          redirectTo: window.location.origin + "/reset-password.html",
        });

        link.textContent = "Forgot password?";

        if (error) {
          showError(friendlyError(error.message));
        } else {
          showSuccess(
            `Reset link sent to ${email}. Check your inbox (and spam folder).`,
          );
        }
      };

      // ── Alert helpers ─────────────────────────────────────────────────────
      function showError(msg) {
        const el = document.getElementById("alertError");
        el.textContent = msg;
        el.classList.add("show");
        document.getElementById("alertSuccess").classList.remove("show");
      }

      function showSuccess(msg) {
        const el = document.getElementById("alertSuccess");
        el.textContent = msg;
        el.classList.add("show");
        document.getElementById("alertError").classList.remove("show");
      }

      window.showError = showError;
      window.showSuccess = showSuccess;
    </script>

    <script>
      "use strict";

      window.togglePw = function () {
        const input = document.getElementById("password");
        input.type = input.type === "password" ? "text" : "password";
      };

      window.clearAlerts = function () {
        document.getElementById("alertError").classList.remove("show");
        document.getElementById("alertSuccess").classList.remove("show");
      };

      window.validate = function () {
        let ok = true;
        const email = document.getElementById("email");
        const pass = document.getElementById("password");
        const eErr = document.getElementById("err-email");
        const pErr = document.getElementById("err-password");

        [eErr, pErr].forEach((el) => el.classList.remove("show"));
        [email, pass].forEach((el) => el.classList.remove("error"));

        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value.trim())) {
          eErr.classList.add("show");
          email.classList.add("error");
          ok = false;
        }
        if (!pass.value.trim()) {
          pErr.classList.add("show");
          pass.classList.add("error");
          ok = false;
        }
        return ok;
      };
    </script>
  </body>
</html>
