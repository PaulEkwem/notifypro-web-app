<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password — NotifyPro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/signup.css" />
    <style>
      .alert {
        border-radius: var(--radius-sm);
        padding: 12px 16px;
        font-size: 13px;
        margin-bottom: 1.2rem;
        display: none;
        line-height: 1.5;
      }
      .alert.show { display: block; }
      .alert-error {
        background: rgba(255, 77, 109, 0.07);
        border: 1px solid rgba(255, 77, 109, 0.2);
        color: var(--error);
      }
      .alert-success {
        background: rgba(0, 232, 122, 0.07);
        border: 1px solid rgba(0, 232, 122, 0.2);
        color: var(--accent);
      }
      .pw-wrap {
        position: relative;
      }
      .pw-toggle {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        cursor: pointer;
        font-size: 16px;
        color: var(--muted);
        padding: 0;
      }
    </style>
  </head>
  <body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <nav>
      <a href="index.html" class="logo">Notify<span>Pro</span></a>
      <a href="login.html" class="nav-back">← Back to login</a>
    </nav>

    <div class="page-wrap">
      <div class="signup-container">
        <div class="card">
          <h2 class="step-heading">Set new password</h2>
          <p class="step-sub">Choose a strong password for your NotifyPro account.</p>

          <div class="alert alert-error" id="alertError"></div>
          <div class="alert alert-success" id="alertSuccess"></div>

          <div class="form-group">
            <label for="password">New Password</label>
            <div class="pw-wrap">
              <input
                type="password"
                id="password"
                placeholder="At least 8 characters"
                oninput="clearAlerts()"
              />
              <button class="pw-toggle" type="button" onclick="togglePw('password')">👁</button>
            </div>
            <div class="error-msg" id="err-password">Password must be at least 8 characters</div>
          </div>

          <div class="form-group">
            <label for="confirm">Confirm Password</label>
            <div class="pw-wrap">
              <input
                type="password"
                id="confirm"
                placeholder="Repeat your new password"
                oninput="clearAlerts()"
                onkeydown="if(event.key==='Enter') updatePassword()"
              />
              <button class="pw-toggle" type="button" onclick="togglePw('confirm')">👁</button>
            </div>
            <div class="error-msg" id="err-confirm">Passwords do not match</div>
          </div>

          <div style="margin-top: 1.5rem">
            <button class="btn-primary" id="updateBtn" onclick="updatePassword()">
              Update Password →
            </button>
          </div>
        </div>
      </div>
    </div>

    <script type="module">
      import { supabase } from "./assets/js/supabase-config.js";

      // Supabase automatically picks up the token from the URL hash
      // and establishes a session — we just need to call updateUser
      supabase.auth.onAuthStateChange(async (event, session) => {
        if (event === "PASSWORD_RECOVERY") {
          // Session is active, user can now update their password
          document.getElementById("updateBtn").disabled = false;
        }
      });

      window.updatePassword = async function () {
        const password = document.getElementById("password").value;
        const confirm  = document.getElementById("confirm").value;
        const btn      = document.getElementById("updateBtn");

        // Validate
        document.getElementById("err-password").classList.remove("show");
        document.getElementById("err-confirm").classList.remove("show");
        document.getElementById("password").classList.remove("error");
        document.getElementById("confirm").classList.remove("error");

        if (password.length < 8) {
          document.getElementById("err-password").classList.add("show");
          document.getElementById("password").classList.add("error");
          return;
        }
        if (password !== confirm) {
          document.getElementById("err-confirm").classList.add("show");
          document.getElementById("confirm").classList.add("error");
          return;
        }

        btn.textContent = "Updating…";
        btn.disabled = true;

        const { error } = await supabase.auth.updateUser({ password });

        if (error) {
          showError(error.message || "Could not update password. Try requesting a new reset link.");
          btn.textContent = "Update Password →";
          btn.disabled = false;
        } else {
          showSuccess("Password updated! Redirecting to login…");
          setTimeout(() => {
            window.location.href = "login.html";
          }, 2000);
        }
      };

      function showError(msg) {
        const el = document.getElementById("alertError");
        el.textContent = msg;
        el.classList.add("show");
        document.getElementById("alertSuccess").classList.remove("show");
      }

      function showSuccess(msg) {
        const el = document.getElementById("alertSuccess");
        el.textContent = msg;
        el.classList.add("show");
        document.getElementById("alertError").classList.remove("show");
      }

      window.showError   = showError;
      window.showSuccess = showSuccess;
    </script>

    <script>
      window.togglePw = function (id) {
        const input = document.getElementById(id);
        input.type = input.type === "password" ? "text" : "password";
      };
      window.clearAlerts = function () {
        document.getElementById("alertError").classList.remove("show");
        document.getElementById("alertSuccess").classList.remove("show");
      };
    </script>
  </body>
</html>
